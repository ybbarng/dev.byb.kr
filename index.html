<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>dev · ybbarng</title>
<meta name="description" content="ybbarng의 개발 공간 — Lab과 Toy를 자유롭게 만들어 굴려보는 곳." />
<style>
  :root{ --bg:#0b0f14; --bg2:#11161f; --line:#1f2733; --txt:#e8eef7; --muted:#8b97a7; --gold:#f5a623;
    --lab:#6ea8ff; --toy:#7CFC9A; --game:#c78bff; --archive:#c2a878; }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    line-height:1.6; -webkit-font-smoothing:antialiased;}
  .wrap{max-width:920px; margin:0 auto; padding:0 20px;}
  header{padding:64px 0 26px; text-align:center;}
  .logo{font-size:clamp(34px,8vw,54px); font-weight:900; letter-spacing:-1px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}
  .logo .br{color:var(--muted); font-weight:600;}
  .logo .dev{color:var(--gold);}
  .tagline{color:var(--muted); margin-top:12px; font-size:15px;}
  .tagline b.lab{color:var(--lab);} .tagline b.toy{color:var(--toy);}
  .filters{display:flex; gap:8px; justify-content:center; margin:26px 0 8px; flex-wrap:wrap;}
  .fbtn{font-size:13.5px; font-weight:700; padding:7px 16px; border-radius:999px; cursor:pointer;
    background:var(--bg2); border:1px solid var(--line); color:var(--muted); transition:.15s;}
  .fbtn:hover{border-color:#33405e;}
  .fbtn.on{background:#1c2434; color:#fff; border-color:rgba(245,166,35,.45);}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; padding:22px 0 60px;}
  .card{display:block; text-decoration:none; color:inherit; background:linear-gradient(180deg,#11161f,#0d1219);
    border:1px solid var(--line); border-radius:16px; padding:20px; transition:.16s;}
  .card:hover{border-color:#33405e; transform:translateY(-2px); box-shadow:0 8px 26px rgba(0,0,0,.35);}
  .card-top{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
  .card-emoji{font-size:26px;}
  .badge{font-size:11px; font-weight:800; padding:3px 9px; border-radius:999px; margin-left:auto;}
  .badge.lab{color:#0a1428; background:var(--lab);}
  .badge.toy{color:#06210f; background:var(--toy);}
  .badge.game{color:#1a0a2e; background:var(--game);}
  .badge.archive{color:#2a1f0a; background:var(--archive);}
  .card-title{font-size:17px; font-weight:800; line-height:1.35;}
  .card-desc{color:var(--muted); font-size:13.5px; margin-top:8px;}
  .card-meta{color:#5c6b7d; font-size:12px; margin-top:14px; display:flex; gap:8px; align-items:center;}
  .card-go{margin-left:auto; color:var(--gold); font-weight:700;}
  .empty{grid-column:1/-1; text-align:center; color:var(--muted); padding:40px 0;}
  footer{text-align:center; color:#5c6b7d; font-size:13px; padding:30px 0 50px; border-top:1px solid var(--line);}
  footer a{color:var(--muted);}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo"><span class="dev">dev</span><span class="br">.byb.kr</span></div>
      <div class="tagline">ybbarng가 이것저것 만들어 굴려보는 공간 — <b class="lab">🧪 Lab</b>과 <b class="toy">🎮 Toy</b></div>
      <div class="filters" id="filters">
        <button class="fbtn on" data-f="all">전체</button>
        <button class="fbtn" data-f="lab">🧪 Lab</button>
        <button class="fbtn" data-f="toy">🎮 Toy</button>
        <button class="fbtn" data-f="game">🕹️ Game</button>
        <button class="fbtn" data-f="archive">📦 Archive</button>
      </div>
    </header>
    <main class="grid" id="grid"></main>
    <footer>
      만든 사람 <a href="https://github.com/ybbarng">@ybbarng</a> · <a href="https://gh.byb.kr">blog</a>
    </footer>
  </div>
<script>
  // 프로젝트를 추가할 때마다 아래 배열에 한 항목만 넣으면 됩니다.
  const PROJECTS = [
    {
      href:'https://set.byb.kr/', emoji:'🃏', tag:'game',
      title:'보드게임 SET',
      desc:'12장의 카드에서 규칙에 맞는 세 장의 조합(SET)을 먼저 찾는 실시간 패턴 인식 보드게임을 웹으로 옮겼습니다.',
      meta:'2016년',
    },
    {
      href:'https://gorados.byb.kr/', emoji:'🗺️', tag:'archive',
      title:'GORADOS · 포켓몬GO 지도',
      desc:'포켓몬GO 포켓스톱·체육관 위치를 지도에 보여주던 서비스. 지금은 목업 데이터로 동작합니다.',
      meta:'2017년 2–3월',
    },
    {
      href:'https://github.com/ybbarng/tweet-manager', emoji:'🐦', tag:'lab',
      title:'tweet-manager',
      desc:'트윗을 모아 관리하는 개인용 앱. 웹이 아니라 앱이라 코드는 GitHub에서 볼 수 있습니다.',
      meta:'2026년 1월',
    },
    {
      href:'https://ftf.byb.kr/', emoji:'🇫🇷', tag:'lab',
      title:'Français Très Facile',
      desc:'RFI의 쉬운 프랑스어 뉴스(Journal en français facile)를 받아, 프랑스어를 조금 더 쉽게 익히도록 돕는 학습 도구입니다.',
      meta:'2026년 2월',
    },
    {
      href:'https://gh.byb.kr/claude-buddy-showcase/', emoji:'🤖', tag:'archive',
      title:'Claude Buddy Showcase',
      desc:'Claude Code와 함께 노는 버디(사운드팩 등)를 모아 보여주는 쇼케이스입니다.',
      meta:'2026년 4월',
    },
    {
      href:'./worldcup-2026/', emoji:'⚽', tag:'archive',
      title:'데이터로 본 2026 월드컵',
      desc:'FIFA 랭킹 기반 Elo로 32강부터 결승까지 50만 회 시뮬레이션해 매일 예측을 발행하고, 대회가 끝난 뒤 얼마나 맞았는지 지도로 되돌아봅니다.',
      meta:'2026년 6–7월',
    },
  ];
  const TAGLABEL = {lab:'🧪 Lab', toy:'🎮 Toy', game:'🕹️ Game', archive:'📦 Archive'};
  const grid = document.getElementById('grid');
  function render(f){
    const list = f==='all' ? PROJECTS : PROJECTS.filter(p=>p.tag===f);
    if(!list.length){ grid.innerHTML = '<div class="empty">아직 여기엔 없어요 — 곧 채워집니다 🌱</div>'; return; }
    grid.innerHTML = list.map(p=>{
      const ext = /^https?:/.test(p.href), gh = /github\.com/.test(p.href);
      return `<a class="card" href="${p.href}"${ext?' target="_blank" rel="noopener"':''}>
        <div class="card-top"><span class="card-emoji">${p.emoji}</span><span class="badge ${p.tag}">${TAGLABEL[p.tag]}</span></div>
        <div class="card-title">${p.title}</div>
        <div class="card-desc">${p.desc}</div>
        <div class="card-meta"><span>${p.meta||''}</span><span class="card-go">${gh?'GitHub ↗':ext?'바로가기 ↗':'열기 →'}</span></div>
      </a>`;}).join('');
  }
  document.getElementById('filters').addEventListener('click', e=>{
    const b = e.target.closest('.fbtn'); if(!b) return;
    document.querySelectorAll('.fbtn').forEach(x=>x.classList.toggle('on', x===b));
    render(b.dataset.f);
  });
  render('all');
</script>
</body>
</html>
